<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07004a">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/MRS-192.png">
  <title>Mitman Racing</title>

  <style>
    html, body { height:100%; margin:0; }
    body{
      font-family: Arial, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      background: #07004a;
      background-attachment: fixed;
    }
    .card{
      width:min(520px, 100%);
     background:#0b0f2d;
    color:white;
    border:1px solid #1c1370;
      border-radius:16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      padding:18px;
      
    }
    .title{
  font-size:22px;
  font-weight:900;
  color:white;
  margin:0 0 6px;
  letter-spacing:0.2px;
    }
    .sub{
    margin:0 0 14px;
    color:#ffffff;
    font-size:13px;
    line-height:1.5;
    opacity:0.9;
    }
    .btnRow{ display:flex; gap:10px; flex-wrap:wrap; }
   button{
    background:#1c1370;
    color:white;
  font-weight:800;
  padding:12px 14px;
  border-radius:12px;
      transition: all .15s ease;
    }
    button:hover{ background:#000000; color:#ffffff; }
    button.secondary{
    background:white;
    color:#07004a;
      border:1px solid #ffffff;
    }
    .small{
      margin-top:10px;
      font-size:12px;
      color:#475569;
      opacity:.95;
    }
    .badge{
      display:inline-block;
      font-size:11px;
      font-weight:700;
      padding:4px 8px;
      border-radius:999px;
      background:#1c1370;
      color:white;
      margin-left:8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="./icons/MRS-192.png" style="height:90px;margin-bottom:10px;">
    <div class="title">
    Mitman Racing
    <span class="badge">Launcher</span>
</div>
    <p class="sub">
Öppna Mitman Racing direkt från din hemskärm.
Installera appen för bästa möjliga upplevelse på dator, Android eller iPhone.
</p>

    <div class="btnRow">
      <button id="openBtn" type="button">Öppna Stall App</button>
      <button id="installBtn" class="secondary" type="button" style="display:none;">Installera</button>
    </div>

    <div class="small" id="status"></div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyyDXjy--fIJbVFMm8Ckg-MOnrAZd1M0fv1Rgd01l5WBwaB0GTf32rRaA7IEAyHyUEi/exec";

    const isStandalone =
  window.matchMedia('(display-mode: standalone)').matches ||
  window.navigator.standalone === true;

if (isStandalone) {
  window.location.replace(APP_URL);
}

    // Open app
    document.getElementById("openBtn").addEventListener("click", () => {
     window.location.assign(APP_URL);
    });

    // Service worker (for installability / basic caching of wrapper)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }

    // Install prompt (Chrome/Edge/Android)
    let deferredPrompt = null;
    const installBtn = document.getElementById("installBtn");
    const status = document.getElementById("status");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "inline-block";
      status.textContent = "Du kan installera appen här.";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = "none";
      status.textContent = "Installerad (om du godkände prompten).";
    });

    // Optional: auto-redirect after a short delay (uncomment if you want)
    // setTimeout(() => window.location.href = APP_URL, 700);
  </script>
</body>
</html>
